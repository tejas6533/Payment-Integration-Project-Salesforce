<template>
    <lightning-card title="Create Transaction">

        <div class="slds-p-around_medium">

            <lightning-input
                label="Amount"
                type="number"
                value={amount}
                onchange={handleAmount}>
            </lightning-input>

            <lightning-input
                label="Receiver"
                value={receiver}
                onchange={handleReceiver}>
            </lightning-input>

            <br/>

            <lightning-button
                label="Submit Transaction"
                variant="brand"
                onclick={handleSubmit}>
            </lightning-button>

        </div>

    </lightning-card>
</template>
